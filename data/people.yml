- title: Justice Isaac Lenaola
  date: 2018-12-14 13:45:00+02:00
  position: 3
  group: board
  image: /img/board/lenaola.jpg
  content: 'Justice Isaac Lenaola is a Justice of the Supreme Court of Kenya.  Following
    a successful career at the Kenyan bar, he joined the judicial service in 2003
    and worked as Resident Judge in several seats of the High Court of Kenya.   Until
    his appointment as Judge of the Supreme Court, Judge Lenaola was the Presiding
    Judge of the Constitutional and Human Rights Division at the High Court in Milimani,
    Nairobi.


    Justice Lenaola has served as Judge and Deputy Principal Judge of the Court of
    First Instance of the East African Court of Justice (EACJ) from 2011 to 2018 and
    as a Judge at the Residual Special Court for Sierra Leone (RSCL) from 2013 to
    date.


    He was previously a Member of the Board, Judicial Training Institute (JTI) and
    Chairman and member of various Judiciary Committees as well as Chairman of the
    Kenya Magistrates and Judges Association (KMJA) and Treasurer of the East African
    Magistrates and Judges Association (EAMJA). He is President of the Advisory Council
    of the Strathmore Institute for Advanced Studies in International Criminal Justice
    (SIASIC) and President of the International Association of Refugee and Migration
    Judges (IARMJ).


    Justice Lenoala’s contributions to the administration of justice in Kenya and
    the East African region has been recognised through numerous awards from national
    and regional justice sector institutions, including the Moran of the Burning Spear
    (MBS) from the President of the Republic of Kenya for distinguished service in
    the administration of justice in Kenya and the East African Region.  He has also
    been named Jurist of the Year by the International Commission of Jurists (ICJ)—Kenya
    Chapter (2019).'
