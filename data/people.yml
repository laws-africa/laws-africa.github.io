- title: Greg Kempe
  date: 2018-12-14 13:43:00+02:00
  position: 0
  role: Co-founder and CTO
  email: greg@laws.africa
  group: core
  profile: greg
  image: /img/team/greg.jpg
  content: 'Greg is a co-founder of Laws.Africa, where he leads the development of
    legal information systems that provide free, structured access to legislation,
    case law, and government gazettes across multiple African countries. A software
    engineer by background, he focuses on building reliable, scalable systems and
    the pragmatic application of AI to improve how legal information is created, maintained,
    and accessed.


    His work sits at the intersection of public infrastructure, legal systems, and
    sustainable business models for open access to law. Greg works closely with governments,
    legal professionals, and partner organisations across Africa. Before founding
    Laws.Africa, he worked at OpenUp and Amazon Web Services (AWS), and holds an MSc
    in Computer Science from the University of British Columbia.'
- title: Mariya Badeva
  date: 2018-12-14 13:44:00+02:00
  position: 1
  email: mariya@laws.africa
  role: Co-founder and Director of Strategy, Growth and Partnerships
  group: core
  image: /uploads/mariya_new.jpeg
  profile: mariyab85
  content: 'Mariya Badeva is a co-founder of Laws.Africa and an open-law expert who
    has worked to expand free access to African legal information since 2004. She
    helped build and support a network of open-access law portals across the African
    continent and has led major initiatives to digitise, consolidate, and publish
    legislation and case law. Her work bridges law, technology and institutional change,
    with deep expertise in legal information standards, editorial policy, and practical
    implementation with public institutions.


    She holds an LL.M in Law and Information Technology (Stockholm University) and
    has taught in this field.'
- title: Vidhu Vedalankar
  date: 2018-12-14 13:45:00+02:00
  position: 1
  group: board
  image: /img/board/vidhu.jpg
  content: 'Ms Vidhu Vedalankar brings extensive experience from the NGO and public
    sectors. She has worked in a variety of roles focusing on building the capacity
    of the state to deliver services at scale to the public, in particular to the
    most vulnerable and marginalised people of our communities.


    Most recently she served as the CEO of Legal Aid South Africa managing the delivery
    of professional legal services through a national footprint to reach clients thus
    increasing access to justice for millions of South Africans. She also served at
    Executive and CEO levels in local government in the Durban metropolitan area.
    This speaks to her many years of experience in executive management.


    Ms Vedalankar has skills and expertise in Leadership and Management, Strategic
    Planning, Business Planning, Sustainability planning and practice, Operationalising
    and execution of strategy, delivery of services at scale as well as Engagement
    with and Accountability to internal and external stakeholders


    She is committed to sustainable performance excellence, leveraging available resources
    to optimise efficiency and effectiveness, ethical leadership, good governance
    and being informed in all decisions by a scientific data driven approach.


    Ms Vedalankar has a Masters degree in Town Planning, a Bachelor of Science degree
    as well as an Executive Development certificate.'
- title: Bianca Braun
  date: 2026-04-07 12:00:00+02:00
  position: 2
  role: Chief Financial Officer
  group: core
  image: /img/team/bianca.jpg
  content: 'Bianca Braun is the Chief Financial Officer at Laws.Africa, where she
    leads financial strategy, operations, and governance across the organisation.
    With over 25 years of international experience, she specialises in integrating
    finance with business operations to support sustainable growth across both non-profit
    and commercial environments.


    Her expertise includes financial governance and compliance (US GAAP, IFRS, SOX),
    funder and grant management, and the implementation of financial systems that
    improve efficiency and transparency. Bianca has worked extensively across Africa
    and Europe in senior finance roles, and as a fractional financial director to
    organisations in the social impact and technology sectors.'
- title: Ndidi Ezenwa
  date: 2018-12-14 13:45:00+02:00
  position: 2
  group: board
  image: /img/board/ndidi.jpg
  content: Ms. Ndidi Ezenwa is a member of the Advisory Board of Laws.Africa and is
    passionate about the use of technology to improve access to justice. Ndidi is
    the General Counsel at Juven, a private investment firm which invests in technology
    enabled and consumer businesses operating in Africa. Ndidi previously worked as
    a private equity lawyer at international law firm White & Case in London and Singapore
    where she advised a diverse range of financial sponsors on cross border transactions,
    with a focus on emerging market transactions.  She was also seconded to work as
    Head of Legal and Investor Relations for Kobo360, a Lagos based tech startup.
    Ndidi has a LLB in Law from the London School of Economics and Political Science.
