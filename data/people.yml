- title: Robert Buergenthal
  date: 2018-12-14 13:45:00+02:00
  position: 4
  group: board
  image: /img/board/robert.jpg
  content: Mr. Robert M. Buergenthal has worked for thirty years to implement international
    development programs and support initiatives that create the underlying conditions
    for sustainable global development. Specializing in governance,  justice sector
    reform, conflict resolution, and civil society development, Buergenthal has worked
    in over seventy-five countries. Throughout his career Buergenthal has led projects
    to support the dissemination of public legal information and academic scholarship.
    Since serving as an observer to the Law via the Internet Conference and the preparation
    of the Montreal Declaration in 2002,  he has regularly partnered with Legal Information
    Institutes (LIIs) and universities worldwide; and championed public information
    technology and public-private partnerships to address development challenges and
    achieve shared goals. Buergenthal most recently served as Senior Director, International
    Strategy, Global Government Affairs for Thomson Reuters Corp. and previously worked
    with the International Development Law Organization (IDLO);  World Bank Group;
    Organization for Security and Cooperation in Europe (OSCE); U.S. Agency for International
    Development (USAID); and the Inter-American Institute of Human Rights.  Buergenthal
    holds a Bachelor of Arts, summa cum laude, from the University of Minnesota and
    a Juris Doctor (JD) from the University of Minnesota School of Law.
