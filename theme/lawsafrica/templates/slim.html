{% set page = article if article is defined else page %}
{% extends "simple.html" %}
{% block content %}
<article>

  <header class="mb-5 py-5 {{ page.header_class }}">
    <div class="container">
      {% if page.masthead_image %}
      <div class="row mb-3">
        <div class="col-6 col-md-4">
          <img src="{{ page.masthead_image }}" class="img-fluid">
        </div>
      </div>
      {% endif %}

      <h1 class="display-4">{{ page.title }}</h1>
      {% if page.lead %}
      <p class="lead mb-3">{{ page.lead }}</p>
      {% endif %}
    </div>
  </header>

  <section class="mb-5 py-3">
    <div class="container">
      <div class="prose">{% block slim_content %}{{ page.content }}{% endblock %}</div>
    </div>
  </section>

</article>

{% endblock %}
